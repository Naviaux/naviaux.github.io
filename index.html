<html>
<head>
	<title>random frets</title>
	<style>

		body {
			background-color: #222;
			overflow:hidden;
		}
		#menu {
			position: fixed;
			left: 0;
			top: 0;
			width: 21vh;
			padding: 1vh;
			font-size: 12pt;
			gap: 1em;
			display: flex;
			flex-flow: row wrap;
		}
		#content{
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: row;
			flex-flow: row wrap;
			height: 90vh;
		}
		div {
				flex-basis:40%;
			color: #ddd;
			text-shadow: 17px 13px 7px black;
			font-family: "Open Sans", sans-serif;
			font-weight: 400;
			font-style: normal;
			font-variation-settings:
				"wdth" 100;
				text-align:center;
		}
		@media screen and (orientation: portrait) {
			div {
				font-size: 20vw;
			}
			.small {
				font-size: 15vw;
			}
		}
		@media screen and (orientation: landscape) {
			div {
				font-size: 25vh;
			}
			.small {
				font-size: 15vh;
			}
		}
		.small {
			color: #aaa;
		}
		.fb {
			flex-basis: 100%;
		}
		#tick {
			display: flex;
			gap: 5vw;
			position: relative;
			top: 8vh;
		}
		#tick div:before {
			content: " ";
			display:block;
			border-radius: 25vh;
			width: 8vw;
			height: 8vw;
			background-color: #d4732e6f;
			box-shadow: 13px 7px 7px black;
		}
		.beat:before {
			background-color: #d4732e !important;
			box-shadow: 13px 7px 7px #532d126f !important;
		}
		#tick div:first-child::after {
			content: " ";
			display:inline-table;
			position: relative;
			top: -50%;
			border-radius: 25vh;
			width: 6vw;
			height: 6vw;
			border: 5px solid #fff3;
		}
		#beats {
			display: flex;
			gap: 10px;
			flex-direction: row;
			justify-content: center;
		}
		#beats div {
			display:block;
			height: 3vh;
			background-color: #d4732e6f;
		}
		.tick {
			background-color: #d4732e !important;
			box-shadow: 13px 7px 7px #532d126f !important;
		}

	</style>

		var snd;

		document.addEventListener("DOMContentLoaded", () => {
			document.getElementById("bpm").value = bpm;

			document.getElementById("bpb").value = bpb;
			document.getElementById("ubo").checked = uniqueBeatOne;

			document.getElementById("stime").checked = showTime;
			
			
			snd = new Audio(sndURI);
			bo = new Audio(boURI);
			cin = new Audio(cinURI);
			document.getElementById("nFret").innerHTML = nFret;
			document.getElementById("nMode").innerHTML = nMode;
			metronomeInterval = setInterval(doMetronome, 1000/bpm*60);
			setInterval(checkScale, 10);
			document.getElementById("content").addEventListener("click", (e) => {
					hasInteracted = !hasInteracted;
					if (!hasInteracted) {
						createTicks();
					}
					if (hasInteracted) {
						prevTime = 0 + (Date.now() - (timeToPlay - 4) * 1000/bpm*60) * doCountIn;
					}
			});
			document.getElementById("bpm").addEventListener("change", (e) => {
				beat = -1;
				hasInteracted = false;
				bpm = e.srcElement.value;
				clearInterval(metronomeInterval);
				metronomeInterval = setInterval(doMetronome, 1000/bpm*60)
				createTicks();
			});
			document.getElementById("ttp").addEventListener("change", (e) => {
				beat = -1;
				hasInteracted = false;
				timeToPlay = e.srcElement.value;

			});
			document.getElementById("bpb").addEventListener("change", (e) => {
				beat = -1;
				hasInteracted = false;
				bpb = e.srcElement.value;

			document.getElementById("ubo").addEventListener("change", (e) => {
				beat = -1;
				hasInteracted = false;
				uniqueBeatOne = e.srcElement.checked;

		function createTicks() {
			document.getElementById("fret").innerHTML = "F";
			document.getElementById("mode").innerHTML = "M";
			beat = -1 - doCountIn * 4;
			prevTime = 0 + (Date.now() - (timeToPlay - 4) * 1000/bpm*60) * doCountIn;
			document.getElementById("tick").innerHTML = "";
			document.getElementById("beats").innerHTML = "";
			for (let i = 0; i < timeToPlay; i++) {
				if (showTime) {
					let bm = document.createElement("div");
					bm.id = "m" + i;
					bm.style.flexBasis =  (42/timeToPlay) + "%";
					document.getElementById("beats").append(bm);
				}
				if (i >= bpb)
					continue;
				if (showBeats) {
					let tm = document.createElement("div");
					tm.id = i;
					document.getElementById("tick").append(tm);
				}
			}
		}

		function checkScale() {
			if (!hasInteracted)
				return;
			if (Date.now() - prevTime < (timeToPlay * 1000/bpm*60))
				return;
			prevTime = Date.now();
			pickScale();
		}

		function pickScale() {
			document.getElementById("fret").innerHTML = nFret;
			document.getElementById("mode").innerHTML = nMode;
			nFret = Math.floor(Math.random() * fretRange + 1);
			nMode = Math.floor(Math.random() * modes + 1);
			document.getElementById("nFret").innerHTML = nFret;
			document.getElementById("nMode").innerHTML = nMode;
		}

		function doMetronome() {
			if (!hasInteracted)
				return;
			if (!muteMetronome) {
				if (doCountIn && beat < -1) {
					cin.currentTime = 0;
					cin.play();
					beat = (beat + 1) % timeToPlay;
					return;

					bo.play();
				} else {
					snd.currentTime = 0;
					snd.play();
				}
			} else if (beat < -1) {
				beat = (beat + 1) % timeToPlay;
				return;
			}
			if(beat>-1) {
				if (showBeats)
				document.getElementById(beat % bpb).className = "";
			
				if (showTime)
				document.getElementById("m" + beat).className = "";
			}
			beat = (beat + 1) % timeToPlay;
				if (showBeats)
			document.getElementById(beat % bpb).className = "beat";
				if (showTime)
			document.getElementById("m" + beat).className = "tick";
		}

	</script>
</head>
<body>
	<div id="menu">
		<label for="bpm" title="Beats per minute">BPM</label><input id="bpm" type="number">
		<label for="ttp" title="Time to play">TTP</label><input id="ttp" type="number">
		<label for="bpb" title="Beats per measure">BPB</label><input id="bpb" type="number">
		<label for="ubo" title="Unique beat one sound">UBO</label><input id="ubo" type="checkbox">
		<label for="cin" title="Unique count in sound">CIN</label><input id="cin" type="checkbox">
		<label for="uci" title="Use count in (1 bar)">UCI</label><input id="uci" type="checkbox">
		<label for="mute" title="Mute metronome">MUTE</label><input id="mute" type="checkbox">
		<label for="sbeats" title="Show beats">BEAT</label><input id="sbeats" type="checkbox">
		<label for="stime" title="Show time tracking">TIME</label><input id="stime" type="checkbox">
	</div>
	<div id="content">
		<div id="tick">
		</div>
		<div id="beats" class="fb">
		</div>
		<div id="fret">F</div>
		<div id="mode">M</div>
		<div id="nFret" class="small"></div>
		<div id="nMode" class="small"></div>
	</div>
</body>
</html>
